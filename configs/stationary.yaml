experiment:
  name: stationary
  T: 10000
  seeds: 20
  log_every: 1000

env:
  n_arms: 20
  n_candidates: 10
  cold_start_user_prob: 0.02
  max_users: 160
  n_user_segments: 6
  bias: -2.0

models:
  fm:
    k: 12
    lr: 0.05
    prior_var: 1.0
    drift_var: 0.0

  probit:
    prior_var: 5.0
    window: 200
    gibbs_steps: 1
    update_every: 50
    ridge: 0.000001

  hybrid:
    warmup_impressions: 15
    blend_span: 120
    max_fm_weight: 0.20
    fm_override_margin: 0.025
    max_probit_drop: 0.05
    recovery_steps: 0

metrics:
  cold_m: 20
  early_n: 1000
